name: Coverage

on:
  pull_request:
    branches: [main]
    paths:
      - "full-stack-github-actions/**"

permissions:
  pull-requests: write

jobs:
  server-coverage:
    name: Server Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: full-stack-github-actions/server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=text --coverageReporters=json-summary | tee coverage-output.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: full-stack-github-actions/server/coverage/coverage-summary.json

  client-coverage:
    name: Client Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: full-stack-github-actions/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=text --coverageReporters=json-summary | tee coverage-output.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: client-coverage
          path: full-stack-github-actions/client/coverage/coverage-summary.json

  coverage-report:
    name: Post Coverage Report
    runs-on: ubuntu-latest
    needs: [server-coverage, client-coverage]

    steps:
      - name: Download server coverage
        uses: actions/download-artifact@v4
        with:
          name: server-coverage
          path: server-coverage

      - name: Download client coverage
        uses: actions/download-artifact@v4
        with:
          name: client-coverage
          path: client-coverage

      - name: Generate report and comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function readCoverage(path, label) {
              try {
                const data = JSON.parse(fs.readFileSync(path, 'utf8'));
                const t = data.total;
                return `| **${label}** | ${t.statements.pct}% | ${t.branches.pct}% | ${t.functions.pct}% | ${t.lines.pct}% |`;
              } catch {
                return `| **${label}** | N/A | N/A | N/A | N/A |`;
              }
            }

            const server = readCoverage('server-coverage/coverage-summary.json', 'Server');
            const client = readCoverage('client-coverage/coverage-summary.json', 'Client');

            const body = `## 📊 Test Coverage Report

            | Module | Statements | Branches | Functions | Lines |
            |--------|-----------|----------|-----------|-------|
            ${server}
            ${client}

            > Generated by the **Coverage** workflow.
            `.replace(/^            /gm, '');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('📊 Test Coverage Report'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
